<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mundo das Palavras</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Fredoka', sans-serif;
}

body{
background:linear-gradient(180deg,#74b9ff,#81ecec);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

.game{
background:white;
width:100%;
max-width:950px;
padding:35px;
border-radius:35px;
box-shadow:0 15px 40px rgba(0,0,0,0.18);
text-align:center;
position:relative;
}

h1{
font-size:3.5rem;
color:#1e3a8a;
margin-bottom:10px;
}

.subtitle{
font-size:1.2rem;
color:#1f2937;
margin-bottom:25px;
font-weight:500;
}

.phase{
background:#dbeafe;
display:inline-block;
padding:10px 25px;
border-radius:20px;
font-size:1.3rem;
color:#1e40af;
font-weight:bold;
margin-bottom:25px;
}

.progress{
width:100%;
height:24px;
background:#dbe4f0;
border-radius:30px;
overflow:hidden;
margin-bottom:30px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#2563eb,#60a5fa);
transition:0.5s;
}

.image{
font-size:7rem;
margin-bottom:20px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}
}

.target{
min-height:90px;
font-size:4rem;
letter-spacing:10px;
margin-bottom:30px;
color:#111827;
font-weight:bold;
background:#f8fafc;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
padding:15px;
border:4px dashed #93c5fd;
}

.letters{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:18px;
margin-bottom:35px;
}

.letter-btn{
width:90px;
height:90px;
border:none;
border-radius:28px;
background:linear-gradient(180deg,#fde68a,#facc15);
font-size:2.2rem;
font-weight:bold;
cursor:pointer;
transition:0.25s;
color:#111827;
box-shadow:0 8px 15px rgba(0,0,0,0.12);
}

.letter-btn:hover{
transform:translateY(-6px) scale(1.05);
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:18px;
flex-wrap:wrap;
margin-top:10px;
width:100%;
}

.control-btn{
padding:16px 28px;
border:none;
border-radius:20px;
background:linear-gradient(180deg,#2563eb,#1d4ed8);
color:white;
font-size:1.1rem;
font-weight:bold;
cursor:pointer;
transition:0.25s;
box-shadow:0 8px 15px rgba(37,99,235,0.3);
min-width:180px;
display:flex;
justify-content:center;
align-items:center;
}

.control-btn:hover{
transform:translateY(-4px) scale(1.03);
}

.message{
margin-top:30px;
font-size:2rem;
min-height:70px;
font-weight:bold;
color:#111827;
}

.score{
margin-top:20px;
font-size:1.5rem;
color:#111827;
font-weight:bold;
}

.star{
position:fixed;
font-size:2rem;
animation:fall 3s linear forwards;
pointer-events:none;
z-index:999;
}

@keyframes fall{

0%{
transform:translateY(-100px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(900px) rotate(360deg);
opacity:0;
}

}

@media(max-width:700px){

h1{
font-size:2.5rem;
}

.target{
font-size:2.8rem;
}

.letter-btn{
width:75px;
height:75px;
font-size:2rem;
}

.image{
font-size:5rem;
}

.control-btn{
width:100%;
min-width:100%;
}

}

</style>
</head>

<body>

<div class="game">

<h1>🌟 Mundo das Palavras 🌟</h1>

<p class="subtitle">
Monte corretamente cada palavra!
</p>

<div class="phase" id="phaseText">
Fase 1
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="image" id="emoji">
👜
</div>

<div class="target" id="currentWord">
_
</div>

<div class="letters" id="lettersContainer"></div>

<!-- BOTÕES -->

<div class="controls">

<button class="control-btn" onclick="checkWord()">
✅ Verificar
</button>

<button class="control-btn" onclick="clearWord()">
🧹 Limpar
</button>

<button class="control-btn" onclick="hearWord()">
🔊 Ouvir Palavra
</button>

</div>

<div class="message" id="message"></div>

<div class="score">
⭐ Pontos: <span id="score">0</span>
</div>

</div>

<script>

const phases = [

{word:"mala",emoji:"👜"},
{word:"lama",emoji:"🟤"},
{word:"lima",emoji:"🍋"},
{word:"lona",emoji:"⛺"},
{word:"mina",emoji:"👧"},
{word:"mano",emoji:"👦"},
{word:"mana",emoji:"👧"},
{word:"mola",emoji:"🌀"},
{word:"mimo",emoji:"🎁"},
{word:"nina",emoji:"👧"},
{word:"fala",emoji:"🗣️"},
{word:"fila",emoji:"🚶"},
{word:"sino",emoji:"🔔"},
{word:"sala",emoji:"🏠"},
{word:"fino",emoji:"📏"},
{word:"fina",emoji:"📏"},
{word:"liso",emoji:"✨"},
{word:"lisa",emoji:"✨"},
{word:"mama",emoji:"👶"},
{word:"lala",emoji:"🎵"},
{word:"fifi",emoji:"🐩"}

];

let currentPhase = 0;
let typedWord = "";
let score = 0;

function speak(text){

const speech =
new SpeechSynthesisUtterance(text);

speech.lang = "pt-BR";
speech.rate = 0.85;
speech.pitch = 1.1;

speechSynthesis.speak(speech);

}

function loadPhase(){

typedWord = "";

document.getElementById("currentWord")
.innerText = "_";

document.getElementById("message")
.innerHTML = "";

const phase = phases[currentPhase];

document.getElementById("emoji")
.innerText = phase.emoji;

document.getElementById("phaseText")
.innerText =
"Fase " + (currentPhase + 1);

const progress =
(currentPhase / phases.length) * 100;

document.getElementById("progressBar")
.style.width =
progress + "%";

createLetters();

speak("Monte a palavra");

}

function createLetters(){

const container =
document.getElementById("lettersContainer");

container.innerHTML = "";

let letters =
phases[currentPhase]
.word
.toUpperCase()
.split("");

letters =
letters.sort(()=>Math.random()-0.5);

letters.forEach(letter=>{

const button =
document.createElement("button");

button.classList.add("letter-btn");

button.innerText = letter;

button.onclick = ()=>addLetter(letter);

container.appendChild(button);

});

}

function addLetter(letter){

typedWord += letter.toLowerCase();

document.getElementById("currentWord")
.innerText = typedWord.toUpperCase();

}

function clearWord(){

typedWord = "";

document.getElementById("currentWord")
.innerText = "_";

}

function checkWord(){

const correctWord =
phases[currentPhase].word;

if(typedWord === correctWord){

score++;

document.getElementById("score")
.innerText = score;

document.getElementById("message")
.innerHTML =
"⭐ Muito bem! ⭐";

speak("Parabéns! Você acertou!");

createStars();

setTimeout(()=>{

nextPhase();

},1500);

}else{

document.getElementById("message")
.innerHTML =
"❌ Tente novamente";

speak("Tente novamente");

}

}

function nextPhase(){

if(currentPhase < phases.length -1){

currentPhase++;

loadPhase();

}else{

document.getElementById("message")
.innerHTML =
"🏆 Você completou todas as fases!";

document.getElementById("progressBar")
.style.width = "100%";

speak("Parabéns! Você terminou o jogo!");

}

}

function hearWord(){

speak(phases[currentPhase].word);

}

function createStars(){

for(let i=0;i<20;i++){

const star =
document.createElement("div");

star.classList.add("star");

star.innerText = "⭐";

star.style.left =
Math.random()*100 + "%";

star.style.top = "-50px";

document.body.appendChild(star);

setTimeout(()=>{
star.remove();
},3000);

}

}

loadPhase();

speak("Bem vindo ao mundo das palavras!");

</script>

</body>
</html>
